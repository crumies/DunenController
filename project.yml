name: DunenDashboard
options:
  bundleIdPrefix: com.crumies
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  DunenDashboard:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: DunenDashboard
        CFBundleIdentifier: com.crumies.DunenDashboard
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSBluetoothAlwaysUsageDescription: This app uses Bluetooth to connect to the DUNEN controller.
        NSLocationWhenInUseUsageDescription: This app uses location to show GPS speed.
        NSMotionUsageDescription: This app uses motion sensors to show tilt and G-force.
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crumies.DunenDashboard
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Manual
