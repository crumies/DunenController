name: AptumDashboard

options:
  bundleIdPrefix: com.crumies
  deploymentTarget:
    iOS: "16.2"

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  AptumDashboard:
    type: application
    platform: iOS

    sources:
      - path: Sources

    resources:
      - path: Assets.xcassets
      - path: Resources

    info:
      path: Info.plist

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crumies.AptumDashboard
        IPHONEOS_DEPLOYMENT_TARGET: 16.2
        TARGETED_DEVICE_FAMILY: "1"
        # Tell the asset catalogue compiler which icon set to compile.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Tell the linker / installer the icon name (backs CFBundleIconName).
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        # Do NOT let Xcode generate/merge Info.plist keys — use our file verbatim.
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_STYLE: Manual
