name: AptumDashboard

options:
  bundleIdPrefix: com.crumies
  deploymentTarget:
    iOS: "16.2"

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  AptumDashboard:
    type: application
    platform: iOS

    sources:
      - path: Sources

    resources:
      - path: Assets.xcassets
      - path: Resources

    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Aptum Dashboard
        CFBundleIdentifier: com.crumies.AptumDashboard
        CFBundleShortVersionString: "11.5"
        CFBundleVersion: "115"
        UILaunchScreen: {}
        NSBluetoothAlwaysUsageDescription: This app uses Bluetooth to connect to the DUNEN e-bike controller.
        NSLocationWhenInUseUsageDescription: This app uses GPS to show your real speed on the dashboard.
        NSMotionUsageDescription: This app does not use phone motion sensors.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportsDocumentBrowser: true
        CFBundleIconName: AppIcon
        UIRequiresFullScreen: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crumies.AptumDashboard
        IPHONEOS_DEPLOYMENT_TARGET: 16.2
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        CODE_SIGN_STYLE: Manual
        SKIP_INSTALL: NO
        STRIP_SWIFT_SYMBOLS: YES
        ENABLE_BITCODE: NO
